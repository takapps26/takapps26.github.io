<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TakApps26</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 40px 20px;
      background: #f7f7f8;
      color: #222;
      line-height: 1.7;
    }
    .container {
      max-width: 760px;
      margin: 0 auto;
      background: #fff;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
    h1 {
      margin-top: 0;
      font-size: 32px;
    }
    h2 {
      margin-top: 32px;
      font-size: 22px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 6px;
    }
    ul {
      padding-left: 20px;
    }
    .app {
      margin-bottom: 16px;
    }
    .footer {
      margin-top: 40px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>TakApps26</h1>
    <p>個人で開発しているアプリのサポートページです。</p>

    <h2>Apps</h2>

    <div class="app">
      <strong>資産運用シミュレーター</strong>
      <p>複利・積立・FIREのシミュレーションをかんたんに行える資産運用計算アプリです。</p>
    </div>

    <div class="app">
      <strong>n等分カメラ</strong>
      <p>カメラ上に円形ガイドを表示し、対象物を2〜36等分で確認できるアプリです。</p>
    </div>

    <div class="footer">
      <p>&copy; 2026 TakApps26</p>
    </div>
  </main>
</body>
</html>
